name: Authenticated production canary

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '37 */6 * * *'

jobs:
  canary:
    name: Railway authenticated workflows
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: read
      id-token: write
      issues: write
    env:
      CANARY_BASE_URL: https://domain-ops-production.up.railway.app
      CANARY_EMAIL: ${{ vars.PRODUCTION_CANARY_EMAIL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Use pinned npm
        run: npm install --global npm@11.4.2

      - name: Exchange GitHub identity for ephemeral credential
        id: credential
        continue-on-error: true
        shell: bash
        run: |
          credential_response=''
          for attempt in {1..24}; do
            oidc_response="$(curl --fail --silent --show-error --header "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=domainscout-production-canary")"
            oidc_token="$(printf '%s' "${oidc_response}" | node -e "let input=''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => process.stdout.write(JSON.parse(input).value ?? '')); ")"
            if [ -z "${oidc_token}" ]; then
              echo 'GitHub did not issue a canary identity token.'
              exit 1
            fi
            echo "::add-mask::${oidc_token}"
            if credential_response="$(curl --fail --silent --show-error --request POST --header "Authorization: Bearer ${oidc_token}" "${CANARY_BASE_URL}/api/canary/session")"; then
              break
            fi
            if [ "${attempt}" -eq 24 ]; then
              echo 'Railway did not accept the canary identity after the deployment window.'
              exit 1
            fi
            sleep 10
          done
          password="$(printf '%s' "${credential_response}" | node -e "let input=''; process.stdin.on('data', chunk => input += chunk); process.stdin.on('end', () => process.stdout.write(JSON.parse(input).password ?? '')); ")"
          if [ -z "${password}" ]; then
            echo 'Railway did not issue an ephemeral canary credential.'
            exit 1
          fi
          echo "::add-mask::${password}"
          echo "password=${password}" >> "${GITHUB_OUTPUT}"

      - name: Run authenticated canary
        id: canary
        if: steps.credential.outcome == 'success'
        continue-on-error: true
        env:
          CANARY_PASSWORD: ${{ steps.credential.outputs.password }}
        shell: bash
        run: |
          set -o pipefail
          npm run canary:production 2>&1 | tee production-canary.log

      - name: Upload sanitized failure diagnostics
        if: steps.canary.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: authenticated-production-canary-failure
          path: production-canary.log
          retention-days: 7

      - name: Open or update failure alert
        if: steps.credential.outcome == 'failure' || steps.canary.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          title='[Production canary] Authenticated workflow failing'
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          issue_number="$(gh issue list --state open --search "${title} in:title" --json number --jq '.[0].number // empty')"
          body="The scheduled authenticated production canary failed at $(date -u +'%Y-%m-%dT%H:%M:%SZ'). Diagnostics are attached to the workflow run: ${run_url}"
          if [ -n "${issue_number}" ]; then
            gh issue comment "${issue_number}" --body "${body}"
          else
            gh issue create --title "${title}" --body "${body}"
          fi

      - name: Close recovered failure alert
        if: steps.credential.outcome == 'success' && steps.canary.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          title='[Production canary] Authenticated workflow failing'
          issue_number="$(gh issue list --state open --search "${title} in:title" --json number --jq '.[0].number // empty')"
          if [ -n "${issue_number}" ]; then
            gh issue close "${issue_number}" --comment "Authenticated production workflows recovered at $(date -u +'%Y-%m-%dT%H:%M:%SZ')."
          fi

      - name: Enforce canary result
        if: steps.credential.outcome == 'failure' || steps.canary.outcome == 'failure'
        run: exit 1
