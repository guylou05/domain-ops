name: Production smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '17 11 * * *'

jobs:
  smoke:
    name: Railway production smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Verify production
        env:
          SMOKE_BASE_URL: https://domain-ops-production.up.railway.app
        run: npm run smoke:production
