name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: Static checks and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Use pinned npm
        run: npm install --global npm@11.4.2

      - name: Verify supply-chain policy
        run: npm run supply-chain:check

      - name: Enforce vulnerability policy
        run: npm run security:audit

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate database assets
        run: npm run db:validate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Enforce client performance budgets
        run: npm run perf:budget

  seeded-e2e:
    name: Seeded Playwright workflows
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16@sha256:17e67d7b9890c99b055ba1e0d5c5be4ec27c9d3a72bda32db24a5e5d8a85af0c
        env:
          POSTGRES_DB: domainscout
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d domainscout"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7@sha256:a8f08480e1f88f2647fed492d1178c06abb0d0c1fbf02c682a61e2f483fb3954
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/domainscout
      REDIS_URL: redis://localhost:6379
      NEXTAUTH_SECRET: ci-nextauth-secret-for-seeded-workflow-tests
      NEXTAUTH_URL: http://127.0.0.1:3000
      E2E_WORKFLOWS: "1"
      ENCRYPTION_KEY: ci-provider-credential-encryption-key-32-chars
      CANARY_PASSWORD: ci-production-canary-password-12345
      CANARY_BASE_URL: http://127.0.0.1:3000
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Use pinned npm
        run: npm install --global npm@11.4.2

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npm run db:deploy

      - name: Seed database
        run: npm run db:seed

      - name: Verify seeded auth
        run: npm run doctor:auth

      - name: Provision least-privilege canary
        run: npm run canary:provision

      - name: Verify authenticated canary scripts
        shell: bash
        run: |
          npm run dev -- --hostname 127.0.0.1 > /tmp/domainscout-canary-server.log 2>&1 &
          server_pid=$!
          trap 'kill "${server_pid}" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/api/health > /dev/null; then
              break
            fi
            if [ "${attempt}" -eq 30 ]; then
              echo 'Canary test server did not become ready.'
              exit 1
            fi
            sleep 2
          done
          npm run canary:production

      - name: Profile critical database queries
        run: npm run perf:queries

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run seeded workflows
        run: npm run test:e2e
