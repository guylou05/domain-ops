name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: Static checks and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate database assets
        run: npm run db:validate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  seeded-e2e:
    name: Seeded Playwright workflows
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: domainscout
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d domainscout"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/domainscout
      NEXTAUTH_SECRET: ci-nextauth-secret-for-seeded-workflow-tests
      NEXTAUTH_URL: http://127.0.0.1:3000
      E2E_WORKFLOWS: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npm run db:deploy

      - name: Seed database
        run: npm run db:seed

      - name: Verify seeded auth
        run: npm run doctor:auth

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run seeded workflows
        run: npm run test:e2e
