services:
  postgres:
    image: postgres:16@sha256:17e67d7b9890c99b055ba1e0d5c5be4ec27c9d3a72bda32db24a5e5d8a85af0c
    environment: { POSTGRES_DB: domainscout, POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres }
    ports: ["5432:5432"]
    volumes: [postgres:/var/lib/postgresql/data]
  redis:
    image: redis:7@sha256:a8f08480e1f88f2647fed492d1178c06abb0d0c1fbf02c682a61e2f483fb3954
    ports: ["6379:6379"]
  web:
    build:
      context: .
      target: builder
    command: npm run dev -- -H 0.0.0.0
    env_file: .env
    ports: ["3000:3000"]
    depends_on: [postgres, redis]
volumes: { postgres: {} }
